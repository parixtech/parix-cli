name: Publish

on:
  release:
    types:
      - published
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    concurrency: npm-publish
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org/
          scope: '@parix'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.12

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Validate release tag
        if: github.event_name == 'release'
        run: |
          node <<'EOF'
          const fs = require('node:fs');
          const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          const expectedTag = `v${pkg.version}`;
          const actualTag = process.env.GITHUB_REF_NAME;
          if (actualTag !== expectedTag) {
            console.error(`Release tag ${actualTag} does not match package.json version ${pkg.version}. Expected ${expectedTag}.`);
            process.exit(1);
          }
          EOF

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bun run typecheck

      - name: Build
        run: bun run build

      - name: Pack release artifact
        id: pack
        run: |
          npm pack --json > npm-pack.json
          node <<'EOF' >> "$GITHUB_OUTPUT"
          const fs = require('node:fs');
          const [packed] = JSON.parse(fs.readFileSync('npm-pack.json', 'utf8'));
          if (!packed?.filename) {
            console.error('npm pack did not report a tarball filename.');
            process.exit(1);
          }
          console.log(`tarball=${packed.filename}`);
          EOF

      - name: Publish to npm
        run: npm publish "${{ steps.pack.outputs.tarball }}" --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_ACCESS_TOKEN }}

      - name: Upload GitHub Release artifact
        if: github.event_name == 'release'
        run: gh release upload "$GITHUB_REF_NAME" "${{ steps.pack.outputs.tarball }}" --clobber
        env:
          GH_TOKEN: ${{ github.token }}
